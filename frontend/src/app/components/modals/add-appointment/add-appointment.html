<form [formGroup]="addForm" (ngSubmit)="save()">

  <h2 mat-dialog-title class="font-semibold!">Add Appointment</h2>

  <mat-dialog-content>
    <div class="flex flex-col gap-4 py-2">
      <mat-form-field appearance="outline" class="w-full" floatLabel="always">
        <mat-label>Date & Time</mat-label>
        <input matInput type="datetime-local" formControlName="date" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Note</mat-label>
        <textarea matInput formControlName="note" placeholder="e.g. Bring your equipment" rows="3"></textarea>
      </mat-form-field>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="abort()">Cancel</button>
    <button mat-flat-button type="submit" [disabled]="!addForm.valid">Add Appointment</button>
  </mat-dialog-actions>

</form>

<form [formGroup]="addForm">
  <h2 mat-dialog-title>Add Appointment</h2>
  <mat-dialog-content class="flex flex-row">
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Note</mat-label>
      <input matInput type="textarea" placeholder="Apportieren war zaghaft" formControlName="note">
    </mat-form-field>
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Date</mat-label>
      <input matInput type="datetime-local" formControlName="date">
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="abort()">Abort</button>
    <button mat-flat-button type="button" [disabled]="!addForm.valid" (click)="save()">Save</button>
  </mat-dialog-actions>
</form>

<form [formGroup]="addForm" (ngSubmit)="save()">

  <h2 mat-dialog-title class="font-semibold!">Add Course</h2>

  <mat-dialog-content>
    <div class="flex flex-col gap-4 py-2">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Course Name</mat-label>
        <input matInput formControlName="name" placeholder="e.g. Grundkurs Herbst 2026" />
      </mat-form-field>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="abort()">Cancel</button>
    <button mat-flat-button type="submit" [disabled]="!addForm.valid">Create Course</button>
  </mat-dialog-actions>

</form>

<div class="p-6 md:p-10">

  <!-- Page header -->
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-2xl font-bold text-zinc-900 dark:text-zinc-100">Your Courses</h1>
      <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">Courses you teach as a trainer</p>
    </div>
    <button
      (click)="openAddCourse()"
      class="flex items-center gap-2 px-4 py-2 bg-violet-600 hover:bg-violet-700 text-white rounded-lg text-sm font-medium transition-colors cursor-pointer"
    >
      <mat-icon fontIcon="ph-plus"></mat-icon>
      Add Course
    </button>
  </div>

  <!-- Course grid -->
  @if (coursesAsTrainer().length > 0) {
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
      @for (course of coursesAsTrainer(); track course.id) {
        <a
          [routerLink]="['/courses', course.id]"
          class="group flex flex-col gap-4 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl p-5 hover:border-violet-300 dark:hover:border-violet-700 hover:shadow-md transition-all cursor-pointer"
        >
          <div class="flex items-start justify-between gap-2">
            <h3 class="font-semibold text-zinc-900 dark:text-zinc-100 truncate group-hover:text-violet-600 dark:group-hover:text-violet-400 transition-colors">
              {{ course.name }}
            </h3>
            <mat-icon fontIcon="ph-arrow-right" class="shrink-0 text-zinc-300 dark:text-zinc-700 group-hover:text-violet-500 transition-colors"></mat-icon>
          </div>

          <div class="flex flex-wrap gap-1">
            @for (trainer of course.trainers; track trainer.id) {
              <span class="text-xs px-2 py-0.5 rounded-full bg-zinc-100 dark:bg-zinc-800 text-zinc-500 dark:text-zinc-400">
                {{ trainer.name }}
              </span>
            }
          </div>
        </a>
      }
    </div>

  } @else {
    <div class="flex flex-col items-center justify-center py-24 text-center">
      <mat-icon fontIcon="ph-book-open" class="text-5xl! text-zinc-300 dark:text-zinc-700 mb-4"></mat-icon>
      <p class="font-medium text-zinc-500 dark:text-zinc-400">No courses yet</p>
      <p class="text-sm text-zinc-400 dark:text-zinc-600 mt-1">Click <span class="font-medium">Add Course</span> to get started</p>
    </div>
  }

</div>

<div class="h-full w-full flex justify-center items-center bg-cyan-100 dark:bg-cyan-800">
  <form
    [formGroup]="loginForm"
    class="h-128 w-128 bg-white dark:bg-black rounded-2xl shadow-xl flex flex-col p-4 items-center gap-2"
    (ngSubmit)="onLogin()"
  >
    <h1 class="text-2xl my-2">Login</h1>
    <p class="text-sm">Dein Trainings-Organizer</p>
    <mat-form-field appearance="fill">
      <mat-label>Username</mat-label>
      <input matInput formControlName="username">
    </mat-form-field>
    <mat-form-field appearance="fill">
      <mat-label>Password</mat-label>
      <input matInput type="password" formControlName="password">
    </mat-form-field>
    <button mat-flat-button color="primary" type="submit" [disabled]="!loginForm.valid">Login</button>
    
    @if (userError(); as user) {
      <p class="text-red-700">
        {{ userError() }}
      </p>
    }
  </form>
</div>
